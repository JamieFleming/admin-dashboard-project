<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <header class="header-container">
        <div id="search-section">
            <img src="magnify.svg" alt="magnifying glass" class="icon" id="search-svg">
            <input type="text" name="search" id="search-bar">
        </div>
        <div id="user-section">
            <img src="bell-ring-outline.svg" alt="ringing bell icon" id="notification-icon" class="icon">
            <img src="selfie.jpeg" alt="selfie" class="selfie" id="small-selfie">
            <h3>Jamie Fleming</h3>
        </div>
        <div id="welcome-user">
            <img src="selfie.jpeg" alt="selfie" class="selfie" id="big-selfie">
            <h4>Hi there,</h4>
            <h2>Jamie Fleming (@fleming1411)</h2>
        </div>
        <nav id="user-nav">
            <ul>
                <li>New</li>
                <li>Upload</li>
                <li>Share</li>
            </ul>
        </nav>
    </header>
    <aside class="sidebar-container"></aside>
    <main class="main-container"></main>
</body>
</html>
